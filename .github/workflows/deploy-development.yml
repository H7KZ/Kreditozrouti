# ==============================================================================
# Workflow: Development Deployment
# Trigger: Push tags matching 'dev-*.*.*' or manual dispatch
#
# Required Secrets: SSH_HOST, SSH_USER, SSH_PORT, SSH_PRIVATE_KEY, GITHUB_TOKEN
#
# Directory Structure on VPS:
#   ~/versions/development/<tag>/   — versioned deployment files
#   ~/versions/development/current  — symlink to active version
#   ~/variables/.env.dev            — environment variables
# ==============================================================================

name: Development Deployment

on:
  push:
    tags:
      - "dev-*.*.*"

  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g., dev-1.0.0)"
        required: true
        type: string
      skip_build:
        description: "Skip build and only deploy (image must exist in registry)"
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-development
  cancel-in-progress: false

jobs:
  deploy:
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: development
      project_name: dev
      float_tag: dev-latest
      cache_scope_suffix: dev
      env_file: .env.dev
      image_tag: ${{ inputs.image_tag || '' }}
      skip_build: ${{ inputs.skip_build || false }}
    secrets: inherit
