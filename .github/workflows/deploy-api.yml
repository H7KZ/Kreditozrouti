# ==============================================================================
# Workflow: Deploy API
# Description: Builds and deploys the API service when api/ or shared/ changes.
#              main → production | develop → development
#
# Trigger: push to main/develop with path filter, or manual dispatch
# ==============================================================================

name: Deploy API

on:
  push:
    branches: [ main ]
    paths:
      - 'api/**'
      - 'shared/**'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (skips build if set)'
        required: false
        type: string
        default: ''
      skip_build:
        description: 'Skip build (image must already exist in registry)'
        required: false
        type: boolean
        default: false
      environment:
        description: 'Target environment'
        required: false
        type: choice
        options: [ production, development ]
        default: production

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-api-${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}
  cancel-in-progress: false

jobs:
  build:
    name: Build API Image
    if: ${{ !inputs.skip_build && inputs.image_tag == '' }}
    uses: ./.github/workflows/_build-service.yml
    with:
      service: api
      float_tag: ${{ github.ref == 'refs/heads/main' && 'latest' || 'dev-latest' }}
      cache_scope: api-${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
    secrets: inherit

  resolve:
    name: Resolve Image Prefix
    runs-on: self-hosted
    needs: [ build ]
    if: ${{ always() && (needs.build.result == 'success' || needs.build.result == 'skipped') }}
    outputs:
      image_prefix: ${{ steps.prefix.outputs.value }}
    steps:
      - name: Compute lowercase prefix
        id: prefix
        run: |
          RAW="${{ needs.build.outputs.image_prefix || github.repository }}"
          echo "value=${RAW,,}" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy API
    needs: [ build, resolve ]
    if: ${{ always() && (needs.build.result == 'success' || needs.build.result == 'skipped') && needs.resolve.result == 'success' }}
    uses: ./.github/workflows/_deploy-service.yml
    with:
      service: api
      environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'development') }}
      project_name: ${{ (github.event_name == 'workflow_dispatch' && inputs.environment == 'production' && 'prod') || github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
      image_tag: ${{ inputs.image_tag != '' && inputs.image_tag || needs.build.outputs.image_tag }}
      image_prefix: ${{ needs.resolve.outputs.image_prefix }}
    secrets: inherit

  cleanup:
    name: Cleanup API package versions
    needs: [ deploy ]
    if: ${{ needs.deploy.result == 'success' }}
    uses: ./.github/workflows/_cleanup-package.yml
    with:
      package-name: kreditozrouti/api
    secrets: inherit
