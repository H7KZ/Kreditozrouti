# ==============================================================================
# Reusable Workflow: Deploy App Stack
# Description: Builds, pushes, and deploys Docker images for a given environment.
#              Called by deploy-production.yml and deploy-development.yml.
#
# Required Secrets (passed from caller):
#   SSH_HOST, SSH_USER, SSH_PORT, SSH_PRIVATE_KEY, GITHUB_TOKEN
# ==============================================================================

name: Deploy (reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: "Environment name (production | development)"
        required: true
        type: string
      project_name:
        description: "Docker Compose project name (prod | dev)"
        required: true
        type: string
      float_tag:
        description: "Floating tag pushed alongside the versioned tag (latest | dev-latest)"
        required: true
        type: string
      cache_scope_suffix:
        description: "GHA cache scope suffix (prod | dev)"
        required: true
        type: string
      env_file:
        description: "Deprecated — env file is now written from the ENV_FILE secret. Kept for backwards compatibility."
        required: false
        type: string
        default: ""
      image_tag:
        description: "Image tag to deploy (taken from workflow_dispatch input or extracted from git tag)"
        required: false
        type: string
        default: ""
      skip_build:
        description: "Skip build and only deploy (image must already exist in registry)"
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io

jobs:
  # ============================================================================
  # Build Job: Build and Push Docker Images
  # ============================================================================
  build:
    name: Build and Push Images
    runs-on: self-hosted
    timeout-minutes: 30
    if: ${{ !inputs.skip_build }}

    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      image_prefix: ${{ steps.meta.outputs.prefix }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Extract Metadata
        id: meta
        run: |
          if [[ -n "${{ inputs.image_tag }}" ]]; then
            TAG="${{ inputs.image_tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          PREFIX=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "prefix=${PREFIX}" >> "$GITHUB_OUTPUT"
          echo "::notice::Building images with tag: ${TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push API
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.prefix }}/api:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.prefix }}/api:${{ inputs.float_tag }}
          cache-from: type=gha,scope=api-${{ inputs.cache_scope_suffix }}
          cache-to: type=gha,mode=max,scope=api-${{ inputs.cache_scope_suffix }}
          platforms: linux/amd64

      - name: Build and Push Client
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./client/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.prefix }}/client:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.prefix }}/client:${{ inputs.float_tag }}
          cache-from: type=gha,scope=client-${{ inputs.cache_scope_suffix }}
          cache-to: type=gha,mode=max,scope=client-${{ inputs.cache_scope_suffix }}
          platforms: linux/amd64

      - name: Build and Push Scraper
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./scraper/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.prefix }}/scraper:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.prefix }}/scraper:${{ inputs.float_tag }}
          cache-from: type=gha,scope=scraper-${{ inputs.cache_scope_suffix }}
          cache-to: type=gha,mode=max,scope=scraper-${{ inputs.cache_scope_suffix }}
          platforms: linux/amd64

  # ============================================================================
  # Prepare Job: Set deployment variables (for skip_build scenario)
  # ============================================================================
  prepare:
    name: Prepare Deployment
    runs-on: self-hosted
    if: ${{ inputs.skip_build }}

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      image_prefix: ${{ steps.meta.outputs.prefix }}

    steps:
      - name: Set Metadata
        id: meta
        run: |
          TAG="${{ inputs.image_tag }}"
          PREFIX=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "prefix=${PREFIX}" >> "$GITHUB_OUTPUT"
          echo "::notice::Deploying existing image with tag: ${TAG}"

  # ============================================================================
  # Deploy Job: Deploy to Server
  # ============================================================================
  deploy:
    name: Deploy to ${{ inputs.environment }}
    needs: [ build, prepare ]
    if: ${{ always() && (needs.build.result == 'success' || needs.prepare.result == 'success') }}
    runs-on: self-hosted
    timeout-minutes: 15

    environment:
      name: ${{ inputs.environment }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Deploy Variables
        id: vars
        run: |
          if [[ -n "${{ needs.build.outputs.image_tag }}" ]]; then
            echo "image_tag=${{ needs.build.outputs.image_tag }}" >> "$GITHUB_OUTPUT"
            echo "image_prefix=${{ needs.build.outputs.image_prefix }}" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=${{ needs.prepare.outputs.image_tag }}" >> "$GITHUB_OUTPUT"
            echo "image_prefix=${{ needs.prepare.outputs.image_prefix }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Version Directory
        uses: appleboy/ssh-action@v1.2.4
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -euo pipefail
            mkdir -p "$HOME/versions/${{ inputs.environment }}/${{ steps.vars.outputs.image_tag }}"

      - name: Upload Deployment Files
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "deployment/"
          target: "~/versions/${{ inputs.environment }}/${{ steps.vars.outputs.image_tag }}"
          strip_components: 1
          overwrite: true

      - name: Execute Deployment
        uses: appleboy/ssh-action@v1.2.4
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          IMG_REGISTRY: ${{ env.REGISTRY }}
          IMG_PREFIX: ${{ steps.vars.outputs.image_prefix }}
          IMG_TAG: ${{ steps.vars.outputs.image_tag }}
          # Non-sensitive config — stored as GitHub Variables (readable in UI)
          APP_PROJECT: ${{ vars.PROJECT }}
          APP_DOMAIN: ${{ vars.DOMAIN }}
          APP_API_ALLOWED_ORIGINS: ${{ vars.API_ALLOWED_ORIGINS }}
          APP_VITE_API_URL: ${{ vars.VITE_API_URL }}
          APP_VITE_FARO_COLLECTOR_URL: ${{ vars.VITE_FARO_COLLECTOR_URL }}
          APP_MYSQL_USER: ${{ vars.MYSQL_USER }}
          APP_MYSQL_DATABASE: ${{ vars.MYSQL_DATABASE }}
          APP_REDIS_URI: ${{ vars.REDIS_URI }}
          # Sensitive credentials — stored as GitHub Secrets (masked)
          APP_API_SESSION_SECRET: ${{ secrets.API_SESSION_SECRET }}
          APP_API_COMMAND_TOKEN: ${{ secrets.API_COMMAND_TOKEN }}
          APP_MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          APP_MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          APP_MYSQL_URI: ${{ secrets.MYSQL_URI }}
          APP_REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: GH_TOKEN,GH_ACTOR,IMG_REGISTRY,IMG_PREFIX,IMG_TAG,APP_PROJECT,APP_DOMAIN,APP_API_ALLOWED_ORIGINS,APP_VITE_API_URL,APP_VITE_FARO_COLLECTOR_URL,APP_MYSQL_USER,APP_MYSQL_DATABASE,APP_REDIS_URI,APP_API_SESSION_SECRET,APP_API_COMMAND_TOKEN,APP_MYSQL_PASSWORD,APP_MYSQL_ROOT_PASSWORD,APP_MYSQL_URI,APP_REDIS_PASSWORD
          script: |
            set -euo pipefail

            VERSION_DIR="$HOME/versions/${{ inputs.environment }}/$IMG_TAG"
            CURRENT_LINK="$HOME/versions/${{ inputs.environment }}/current"

            echo "=========================================="
            echo "Deployment: $IMG_TAG → ${{ inputs.environment }}"
            echo "=========================================="

            echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin

            {
              echo "PROJECT=$APP_PROJECT"
              echo "DOMAIN=$APP_DOMAIN"
              echo "API_ALLOWED_ORIGINS=$APP_API_ALLOWED_ORIGINS"
              echo "VITE_API_URL=$APP_VITE_API_URL"
              echo "VITE_FARO_COLLECTOR_URL=$APP_VITE_FARO_COLLECTOR_URL"
              echo "MYSQL_USER=$APP_MYSQL_USER"
              echo "MYSQL_DATABASE=$APP_MYSQL_DATABASE"
              echo "REDIS_URI=$APP_REDIS_URI"
              echo "API_SESSION_SECRET=$APP_API_SESSION_SECRET"
              echo "API_COMMAND_TOKEN=$APP_API_COMMAND_TOKEN"
              echo "MYSQL_PASSWORD=$APP_MYSQL_PASSWORD"
              echo "MYSQL_ROOT_PASSWORD=$APP_MYSQL_ROOT_PASSWORD"
              echo "MYSQL_URI=$APP_MYSQL_URI"
              echo "REDIS_PASSWORD=$APP_REDIS_PASSWORD"
            } > "$VERSION_DIR/.env"
            chmod 600 "$VERSION_DIR/.env"

            printf 'IMAGE_REGISTRY="%s"\nIMAGE_PREFIX="%s"\nIMAGE_TAG="%s"\n' \
              "$IMG_REGISTRY" "$IMG_PREFIX" "$IMG_TAG" > "$VERSION_DIR/.images"

            cd "$VERSION_DIR"
            bash ./deploy.sh "${{ inputs.project_name }}" "${{ inputs.environment }}"

            ln -sfn "$VERSION_DIR" "$CURRENT_LINK"

            echo "=========================================="
            echo "Deployment completed successfully"
            echo "=========================================="
