# ==============================================================================
# Workflow: Production Deployment
# Trigger: Push tags matching 'v*.*.*' or manual dispatch
#
# Required Secrets: SSH_HOST, SSH_USER, SSH_PORT, SSH_PRIVATE_KEY, GITHUB_TOKEN
#
# Directory Structure on VPS:
#   ~/versions/production/<tag>/   — versioned deployment files
#   ~/versions/production/current  — symlink to active version
#   ~/variables/.env.prod          — environment variables
# ==============================================================================

name: Production Deployment

on:
  push:
    tags:
      - "v*.*.*"

  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g., v1.0.0)"
        required: true
        type: string
      skip_build:
        description: "Skip build and only deploy (image must exist in registry)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: production
      project_name: prod
      float_tag: latest
      cache_scope_suffix: prod
      env_file: .env.prod
      image_tag: ${{ inputs.image_tag || '' }}
      skip_build: ${{ inputs.skip_build || false }}
    secrets: inherit
