# ==============================================================================
# Workflow: CI Pipeline
# Description: Runs code verification on pull requests.
#              Includes dependency installation, linting, and build checks.
# Trigger: Pull request events (opened, synchronize, reopened)
#
# Prerequisites:
#   - Node.js 24
#   - Makefile with install, lint, and build targets
# ==============================================================================

name: CI Pipeline

on:
  pull_request:
    types: [ opened, synchronize, reopened ]

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Code
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Dependencies
        run: make install

      - name: Lint
        run: make lint

      - name: Type Check
        run: make type-check

      - name: Build
        run: make build

      - name: Verification Complete
        run: echo "::notice::All checks passed successfully"
