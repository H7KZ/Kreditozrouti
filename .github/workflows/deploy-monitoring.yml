# ==============================================================================
# Workflow: Deploy Monitoring
# Description: Uploads monitoring config and redeploys the monitoring stack.
#              Runs automatically when monitoring config or script changes on main.
#
# Required Secrets (repository-level):
#   SSH_HOST, SSH_USER, SSH_PORT, SSH_PRIVATE_KEY
#   MONITORING_DOMAIN, GRAFANA_ADMIN_PASSWORD, DISCORD_WEBHOOK_URL
# ==============================================================================

name: Deploy Monitoring

on:
  push:
    branches: [ main ]
    paths:
      - "deployment/monitoring/**"
  workflow_dispatch:

concurrency:
  group: deploy-monitoring
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Monitoring
    runs-on: self-hosted
    timeout-minutes: 10

    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Upload Monitoring Config
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "deployment/monitoring/,deployment/lib.sh"
          target: "~/deployment/"
          strip_components: 1
          overwrite: true

      - name: Deploy Monitoring Stack
        uses: appleboy/ssh-action@v1
        env:
          MONITORING_DOMAIN: ${{ secrets.MONITORING_DOMAIN }}
          GRAFANA_ADMIN_USER: ${{ secrets.GRAFANA_ADMIN_USER }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: MONITORING_DOMAIN,GRAFANA_ADMIN_USER,GRAFANA_ADMIN_PASSWORD,DISCORD_WEBHOOK_URL
          script: |
            set -euo pipefail
            bash ~/deployment/monitoring/deploy.sh
