name: Bug Report
description: Something isn't working as expected
labels: [ 'Bug' ]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: false

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: false

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser, device, OS (optional)
      placeholder: e.g. Chrome 125, iPhone 14, macOS 14
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true
