# nginx.conf
server {
    # ${PORT} is substituted at container start by nginx's envsubst template mechanism
    listen ${PORT};
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ----------------------------------------------------------------------
    # Security Headers
    # ----------------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # ----------------------------------------------------------------------
    # Compression (Gzip)
    # ----------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/rss+xml
        application/atom+xml
        image/svg+xml;

    # ----------------------------------------------------------------------
    # Routing (SPA / Vue Router)
    # ----------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;

        # Never cache index.html so users always get the latest build manifest
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ----------------------------------------------------------------------
    # Caching Static Assets
    # ----------------------------------------------------------------------
    # Vite hashes asset filenames (e.g. index.a4b3c.js) so they are immutable
    location /assets {
        expires 1y;
        add_header Cache-Control "public, no-transform, immutable";
        access_log off;
    }

    location ~* \.(ico|png|jpg|jpeg|gif|svg)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }
}
