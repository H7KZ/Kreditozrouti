# ==============================================================================
# Prometheus Scrape Configuration: Local Development
# Description: Scrapes the API running on the host machine (make dev).
#              host.docker.internal resolves to the host from inside Docker Desktop.
# ==============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: 'development'

rule_files:
  - 'rules.yml'

scrape_configs:
  - job_name: 'kreditozrouti-api'
    static_configs:
      - targets: [ 'host.docker.internal:40080' ]
    metrics_path: '/metrics'
    relabel_configs:
      - target_label: env
        replacement: development
