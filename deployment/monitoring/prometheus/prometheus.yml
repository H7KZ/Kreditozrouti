# ==============================================================================
# Prometheus Scrape Configuration: Production / Staging
# Description: Scrapes the API service from inside the Docker network.
#              Prometheus reaches api:80 via traefik-network.
# ==============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: 'production'

rule_files:
  - 'rules.yml'

scrape_configs:
  - job_name: 'kreditozrouti-api'
    static_configs:
      - targets: [ 'api:80' ]
    metrics_path: '/metrics'
    relabel_configs:
      - target_label: env
        replacement: production

  - job_name: 'node'
    static_configs:
      - targets: [ 'node-exporter:9100' ]
    relabel_configs:
      - target_label: env
        replacement: production
