# ==============================================================================
# Prometheus Recording Rules
# Description: Pre-computed metrics based on raw API metrics.
#              Recording rules fire every 1 minute and cache results for faster
#              dashboards and alerts.
# ==============================================================================

groups:
  - name: kreditozrouti_recordings
    interval: 1m
    rules:
      - record: job:http_request_rate:rate5m
        expr: sum(rate(http_request_duration_seconds_count[5m]))
        help: "Overall HTTP request rate over the last 5 minutes"

      - record: job:http_request_duration_p95:rate5m
        expr: histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket[5m])))
        help: "95th percentile of HTTP request duration over the last 5 minutes"

      - record: job:http_request_duration_p99:rate5m
        expr: histogram_quantile(0.99, sum by (le) (rate(http_request_duration_seconds_bucket[5m])))
        help: "99th percentile of HTTP request duration over the last 5 minutes"

      - record: job:http_errors_ratio:rate5m
        expr: >
          sum(rate(http_request_duration_seconds_count{status_code=~"5.."}[5m]))
          /
          sum(rate(http_request_duration_seconds_count[5m]))
        help: "Ratio of 5xx errors to total requests over the last 5 minutes"

      - record: route:http_request_duration_p95:rate5m
        expr: histogram_quantile(0.95, sum by (le, route) (rate(http_request_duration_seconds_bucket[5m])))
        help: "95th percentile of HTTP request duration by route over the last 5 minutes"
