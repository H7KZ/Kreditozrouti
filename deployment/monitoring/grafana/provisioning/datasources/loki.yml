apiVersion: 1

datasources:
  - name: Loki
    orgId: 1
    uid: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    jsonData:
      maxLines: 5000
      derivedFields:
        - name: TraceID
          matcherRegex: '"traceId":"(\w+)"'
          url: '${__value.raw}'
          datasourceUid: tempo
          urlDisplayLabel: "Open in Tempo"
