# ==============================================================================
# Grafana Alerting: Message Templates
# Custom Discord notification template.
# Title line is embedded in the message body since Discord contact point
# does not support a separate 'title' settings field.
# disableResolveMessage: true on the contact point, so .Status is always "firing".
# ==============================================================================

apiVersion: 1

templates:
  - orgId: 1
    name: discord_alert_message
    template: |
      {{ define "discord_alert_message" -}}
      🔴 **{{ .CommonLabels.alertname | title }}**
      **Status:** {{ .Status | toUpper }}{{ if .CommonLabels.env }} · **Env:** {{ .CommonLabels.env }}{{ end }}{{ if .CommonLabels.severity }} · **Severity:** {{ .CommonLabels.severity | toUpper }}{{ end }}
      {{ range .Alerts -}}
      {{ .Annotations.summary }}
      {{ if .Annotations.description -}}
      > {{ .Annotations.description }}
      {{ end -}}
      {{ end -}}
      {{- end }}
