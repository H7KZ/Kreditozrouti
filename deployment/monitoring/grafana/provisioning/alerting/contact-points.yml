# ==============================================================================
# Grafana Alerting: Contact Points
# Provisions a Discord webhook contact point.
# DISCORD_WEBHOOK_URL is injected via the Grafana container's environment.
# Note: Discord contact point only supports url, message, avatar_url, use_discord_username.
#       Title is embedded as the first line of the message template.
# ==============================================================================

apiVersion: 1

contactPoints:
  - orgId: 1
    name: discord
    receivers:
      - uid: discord-webhook
        type: discord
        settings:
          url: ${DISCORD_WEBHOOK_URL}
          message: '{{ template "discord_alert_message" . }}'
        disableResolveMessage: true
