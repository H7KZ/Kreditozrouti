# ==============================================================================
# Grafana Alerting: Alert Rules
# Three groups: infrastructure (host + container health), scraper (queue +
# staleness + failure rates), application (API error rate + latency).
# datasourceUid must match the uid in datasources/prometheus.yml.
# ==============================================================================

apiVersion: 1

groups:
  - orgId: 1
    name: infrastructure
    folder: Infrastructure
    interval: 1m
    rules:
      - uid: container-down
        title: Container Down
        condition: A
        for: 1m
        annotations:
          summary: 'A scraped target is down'
          description: 'Job {{ $labels.job }} has been down for more than 1 minute.'
        labels:
          severity: critical
        data:
          - refId: A
            queryType: ''
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: Prometheus
            model:
              # up==0 catches static targets (node-exporter) where the target stays in the list but scrape fails.
              # absent() catches Docker SD targets (api) that disappear from discovery when the container stops.
              expr: up == 0 or absent(up{job="kreditozrouti-api"})
              instant: true
              refId: A

      - uid: disk-usage-high
        title: Disk Usage High
        condition: A
        for: 5m
        annotations:
          summary: 'Disk usage above 80%'
          description: 'Available disk on {{ $labels.mountpoint }} is below 20%.'
        labels:
          severity: warning
        data:
          - refId: A
            queryType: ''
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: Prometheus
            model:
              expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.2
              instant: true
              refId: A

      - uid: memory-usage-high
        title: Memory Usage High
        condition: A
        for: 5m
        annotations:
          summary: 'Less than 10% memory available'
          description: 'Host memory is critically low — less than 10% available.'
        labels:
          severity: warning
        data:
          - refId: A
            queryType: ''
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: Prometheus
            model:
              expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) < 0.1
              instant: true
              refId: A

  - orgId: 1
    name: scraper
    folder: Infrastructure
    interval: 1m
    rules:
      - uid: scraper-jobs-failed
        title: Scraper Jobs Failed
        condition: A
        for: 5m
        annotations:
          summary: 'BullMQ scraper jobs are failing'
          description: 'Queue {{ $labels.queue }} has had {{ $values.A }} failed job(s) for more than 5 minutes. Check BullBoard for details.'
        labels:
          severity: critical
        data:
          - refId: A
            queryType: ''
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: Prometheus
            model:
              expr: bullmq_queue_depth{queue=~"Scraper.*", status="failed"} > 0
              instant: true
              refId: A

      - uid: scraper-stale
        title: Scraper Stale
        condition: A
        for: 5m
        annotations:
          summary: 'Scraper has not run in 24h'
          description: 'A scraper job has not run in more than 24 hours. Check cron schedule and Redis connectivity.'
        labels:
          severity: warning
        data:
          - refId: A
            queryType: ''
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: Prometheus
            model:
              expr: (scraper_last_run_timestamp > 0) and (time() - scraper_last_run_timestamp > 86400)
              instant: true
              refId: A

      - uid: scraper-silent-failures-rising
        title: Scraper Silent Failures Rising
        condition: A
        for: 0m
        annotations:
          summary: 'Scraper silent failures rising'
          description: '{{ $values.A }} silent failures in the last 30 minutes. These are caught exceptions that do not fail BullMQ jobs.'
        labels:
          severity: warning
        data:
          - refId: A
            queryType: ''
            relativeTimeRange:
              from: 1800
              to: 0
            datasourceUid: Prometheus
            model:
              expr: increase(scraper_silent_failures_total[30m]) > 5
              instant: true
              refId: A

      - uid: scraper-failure-rate-high
        title: Scraper Failure Rate High
        condition: A
        for: 5m
        annotations:
          summary: 'Scraper item failure rate above 10%'
          description: 'More than 10% of scraped items are failing to process over the last 5 minutes.'
        labels:
          severity: warning
        data:
          - refId: A
            queryType: ''
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: Prometheus
            model:
              expr: rate(scraper_items_processed_total{status="failure"}[5m]) / clamp_min(rate(scraper_items_processed_total{status="success"}[5m]) + rate(scraper_items_processed_total{status="failure"}[5m]), 0.00001) > 0.1
              instant: true
              refId: A

  - orgId: 1
    name: application
    folder: Application
    interval: 1m
    rules:
      - uid: api-error-rate-high
        title: API Error Rate High
        condition: A
        for: 5m
        annotations:
          summary: 'API 5xx error rate above 5%'
          description: 'More than 5% of API requests are returning 5xx errors over the last 5 minutes.'
        labels:
          severity: warning
        data:
          - refId: A
            queryType: ''
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: Prometheus
            model:
              expr: sum(rate(http_request_duration_seconds_count{status_code=~"5..",env="production"}[5m])) / sum(rate(http_request_duration_seconds_count{env="production"}[5m])) > 0.05
              instant: true
              refId: A

      - uid: api-p99-latency-high
        title: API p99 Latency High
        condition: A
        for: 5m
        annotations:
          summary: 'API p99 latency above 2 seconds'
          description: 'The 99th percentile API response time has exceeded 2 seconds over the last 5 minutes.'
        labels:
          severity: warning
        data:
          - refId: A
            queryType: ''
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: Prometheus
            model:
              expr: histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{env="production"}[5m])) by (le)) > 2
              instant: true
              refId: A
