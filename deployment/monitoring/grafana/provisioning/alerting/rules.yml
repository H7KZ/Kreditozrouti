# ==============================================================================
# Grafana Alerting: Alert Rules
# Three rules: container down, disk > 80%, memory < 10% available.
# datasourceUid must match the uid in datasources/prometheus.yml.
# ==============================================================================

apiVersion: 1

groups:
  - orgId: 1
    name: infrastructure
    folder: Infrastructure
    interval: 1m
    rules:
      - uid: container-down
        title: Container Down
        condition: A
        for: 1m
        annotations:
          summary: "A scraped target is down"
          description: "Job {{ $labels.job }} has been down for more than 1 minute."
        labels:
          severity: critical
        data:
          - refId: A
            queryType: ''
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: Prometheus
            model:
              expr: up == 0
              instant: true
              refId: A

      - uid: disk-usage-high
        title: Disk Usage High
        condition: A
        for: 5m
        annotations:
          summary: "Disk usage above 80%"
          description: "Available disk on {{ $labels.mountpoint }} is below 20%."
        labels:
          severity: warning
        data:
          - refId: A
            queryType: ''
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: Prometheus
            model:
              expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.2
              instant: true
              refId: A

      - uid: memory-usage-high
        title: Memory Usage High
        condition: A
        for: 5m
        annotations:
          summary: "Less than 10% memory available"
          description: "Host memory is critically low — less than 10% available."
        labels:
          severity: warning
        data:
          - refId: A
            queryType: ''
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: Prometheus
            model:
              expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) < 0.1
              instant: true
              refId: A

  - orgId: 1
    name: scraper
    folder: Infrastructure
    interval: 1m
    rules:
      - uid: scraper-jobs-failed
        title: Scraper Jobs Failed
        condition: A
        for: 5m
        annotations:
          summary: "BullMQ scraper jobs are failing"
          description: "Queue {{ $labels.queue }} has had {{ $values.A }} failed job(s) for more than 5 minutes. Check BullBoard for details."
        labels:
          severity: critical
        data:
          - refId: A
            queryType: ''
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: Prometheus
            model:
              expr: bullmq_queue_depth{queue=~"Scraper.*", status="failed"} > 0
              instant: true
              refId: A

  - orgId: 1
    name: application
    folder: Application
    interval: 1m
    rules:
      - uid: api-error-rate-high
        title: API Error Rate High
        condition: A
        for: 5m
        annotations:
          summary: "API 5xx error rate above 5%"
          description: "More than 5% of API requests are returning 5xx errors over the last 5 minutes."
        labels:
          severity: warning
        data:
          - refId: A
            queryType: ''
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: Prometheus
            model:
              expr: sum(rate(http_request_duration_seconds_count{status_code=~"5.."}[5m])) / sum(rate(http_request_duration_seconds_count[5m])) > 0.05
              instant: true
              refId: A

      - uid: api-p99-latency-high
        title: API p99 Latency High
        condition: A
        for: 5m
        annotations:
          summary: "API p99 latency above 2 seconds"
          description: "The 99th percentile API response time has exceeded 2 seconds over the last 5 minutes."
        labels:
          severity: warning
        data:
          - refId: A
            queryType: ''
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: Prometheus
            model:
              expr: histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 2
              instant: true
              refId: A

      - uid: scraper-queue-stalled
        title: Scraper Queue Stalled
        condition: A
        for: 24h
        annotations:
          summary: "Scraper response queue has been idle for 24 hours"
          description: "No jobs have been waiting or active in the ScraperResponseQueue for 24 hours. The scraper may be down or misconfigured."
        labels:
          severity: warning
        data:
          - refId: A
            queryType: ''
            relativeTimeRange:
              from: 86400
              to: 0
            datasourceUid: Prometheus
            model:
              expr: (bullmq_queue_depth{queue="ScraperResponseQueue", status="waiting"} + bullmq_queue_depth{queue="ScraperResponseQueue", status="active"}) == 0
              instant: true
              refId: A

  - orgId: 1
    name: kreditozrouti_application
    folder: Application
    interval: 1m
    rules:
      - uid: high-error-rate
        title: High Error Rate
        condition: A
        for: 2m
        annotations:
          summary: "HTTP error rate above 5%"
          description: "5xx error rate is {{ $value | humanizePercentage }} over last 5 minutes."
        labels:
          severity: critical
        data:
          - refId: A
            queryType: ''
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: Prometheus
            model:
              expr: job:http_errors_ratio:rate5m > 0.05
              instant: true
              refId: A

      - uid: high-p95-latency
        title: High P95 Latency
        condition: A
        for: 3m
        annotations:
          summary: "HTTP p95 latency above 2s"
          description: "p95 request latency is {{ $value | humanizeDuration }} over last 5 minutes."
        labels:
          severity: warning
        data:
          - refId: A
            queryType: ''
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: Prometheus
            model:
              expr: job:http_request_duration_p95:rate5m > 2
              instant: true
              refId: A

      - uid: scraper-stale
        title: Scraper Stale
        condition: A
        for: 5m
        annotations:
          summary: "Scraper has not run in 24h"
          description: "Job type {{ $labels.job_type }} last ran {{ $value | humanizeDuration }} ago."
        labels:
          severity: warning
        data:
          - refId: A
            queryType: ''
            relativeTimeRange:
              from: 86400
              to: 0
            datasourceUid: Prometheus
            model:
              expr: time() - scraper_last_run_timestamp > 86400
              instant: true
              refId: A

      - uid: scraper-silent-failures-rising
        title: Scraper Silent Failures Rising
        condition: A
        for: 0m
        annotations:
          summary: "Scraper silent failures rising"
          description: "{{ $value }} silent failures in the last 30 minutes."
        labels:
          severity: warning
        data:
          - refId: A
            queryType: ''
            relativeTimeRange:
              from: 1800
              to: 0
            datasourceUid: Prometheus
            model:
              expr: increase(scraper_silent_failures_total[30m]) > 5
              instant: true
              refId: A

      - uid: scraper-failure-rate-high
        title: Scraper Failure Rate High
        condition: A
        for: 5m
        annotations:
          summary: "Scraper failure rate above 10%"
          description: "Scraper failure rate for {{ $labels.job_type }} is {{ $value | humanizePercentage }}."
        labels:
          severity: warning
        data:
          - refId: A
            queryType: ''
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: Prometheus
            model:
              expr: rate(scraper_items_processed_total{status="failure"}[5m]) / (rate(scraper_items_processed_total{status="success"}[5m]) + rate(scraper_items_processed_total{status="failure"}[5m])) > 0.1
              instant: true
              refId: A
