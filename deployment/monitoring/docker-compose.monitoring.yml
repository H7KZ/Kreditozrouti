# ==============================================================================
# Docker Compose: Monitoring Stack
# Description: Prometheus metrics + Grafana Loki logs + Grafana visualization.
#
# Services:
#   - prometheus: Scrapes /metrics from the API; stores time series data
#   - grafana:    Visualization dashboard, exposed at domain/grafana via Traefik
#   - loki:       Log aggregation storage (30-day retention)
#   - alloy:      Log shipping agent — reads Docker stdout, receives Faro browser telemetry
#
# Required Environment Variables (in .env):
#   - DOMAIN: Primary domain for Traefik routing (e.g. kreditozrouti.cz)
#   - PROJECT: Project name prefix for Traefik labels (e.g. kreditozrouti)
#   - GRAFANA_ADMIN_USER: Grafana admin username
#   - GRAFANA_ADMIN_PASSWORD: Grafana admin password
#   - UMAMI_DB_NAME      — PostgreSQL database name for Umami (e.g. umami)
#   - UMAMI_DB_USER      — PostgreSQL user for Umami (e.g. umami)
#   - UMAMI_DB_PASSWORD  — PostgreSQL password (generate once, store in GitHub Secrets)
#   - UMAMI_APP_SECRET   — Umami app secret for session signing (generate once, store in GitHub Secrets)
#
# Deploy order: Traefik → this stack → app stack
# Usage: docker compose -f docker-compose.monitoring.yml -f networks.yml -f volumes.yml up -d
# ==============================================================================

services:
  # ============================================================================
  # Metrics Collector (Prometheus)
  # ============================================================================
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped

    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'

    volumes:
      - prometheus-data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

    networks:
      - monitoring-network
      - traefik-network

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    deploy:
      mode: global
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M

  # ============================================================================
  # Visualization (Grafana)
  # ============================================================================
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped

    depends_on:
      - prometheus

    environment:
      - GF_SERVER_ROOT_URL=https://${DOMAIN}/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}

    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro

    networks:
      - traefik-network
      - monitoring-network

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${PROJECT}-grafana.priority=70"
      - "traefik.http.routers.${PROJECT}-grafana.rule=Host(`${DOMAIN}`) && PathPrefix(`/grafana`)"
      - "traefik.http.routers.${PROJECT}-grafana.entrypoints=websecure"
      - "traefik.http.routers.${PROJECT}-grafana.tls=true"
      - "traefik.http.routers.${PROJECT}-grafana.tls.certresolver=letsencrypt"
      - "traefik.http.services.${PROJECT}-grafana.loadbalancer.server.port=3000"

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    deploy:
      mode: global
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M

  # ============================================================================
  # Log Storage (Loki)
  # Internal only — no Traefik labels. Grafana accesses it at http://loki:3100.
  # ============================================================================
  loki:
    image: grafana/loki:3
    restart: unless-stopped

    command: -config.file=/etc/loki/loki.yml

    volumes:
      - loki-data:/loki
      - ./loki/loki.yml:/etc/loki/loki.yml:ro

    networks:
      - monitoring-network

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    deploy:
      mode: global
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M

  # ============================================================================
  # Log Shipping Agent (Alloy)
  # Reads Docker container stdout via Docker socket → Loki.
  # Also receives Grafana Faro browser telemetry on port 12347 (added in Plan 2).
  # ============================================================================
  alloy:
    image: grafana/alloy:latest
    restart: unless-stopped

    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy-data:/var/lib/alloy/data
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro

    networks:
      - monitoring-network
      - traefik-network

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${PROJECT}-faro.priority=80"
      - "traefik.http.routers.${PROJECT}-faro.rule=PathPrefix(`/faro`)"
      - "traefik.http.routers.${PROJECT}-faro.entrypoints=websecure"
      - "traefik.http.routers.${PROJECT}-faro.tls=true"
      - "traefik.http.routers.${PROJECT}-faro.tls.certresolver=letsencrypt"
      - "traefik.http.middlewares.${PROJECT}-faro-strip.stripprefix.prefixes=/faro"
      - "traefik.http.routers.${PROJECT}-faro.middlewares=${PROJECT}-faro-strip"
      - "traefik.http.services.${PROJECT}-faro.loadbalancer.server.port=12347"

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    deploy:
      mode: global
      resources:
        limits:
          cpus: "0.3"
          memory: 256M
        reservations:
          cpus: "0.05"
          memory: 64M

  # ============================================================================
  # Host Metrics (node-exporter)
  # Exposes CPU, memory, disk, and network metrics for the host.
  # Internal only — Prometheus scrapes it at node-exporter:9100.
  # ============================================================================
  node-exporter:
    image: prom/node-exporter:latest
    restart: unless-stopped

    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/host'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'

    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro,rslave

    networks:
      - monitoring-network

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    deploy:
      mode: global
      resources:
        limits:
          cpus: "0.1"
          memory: 64M
        reservations:
          cpus: "0.05"
          memory: 32M

  # ============================================================================
  # Umami Analytics Database (PostgreSQL 16-alpine)
  # Internal only — no Traefik labels. Umami connects at umami-db:5432.
  # ============================================================================
  umami-db:
    image: postgres:16-alpine
    restart: unless-stopped

    environment:
      - POSTGRES_DB=${UMAMI_DB_NAME}
      - POSTGRES_USER=${UMAMI_DB_USER}
      - POSTGRES_PASSWORD=${UMAMI_DB_PASSWORD}

    volumes:
      - umami-postgres-data:/var/lib/postgresql/data

    networks:
      - monitoring-network

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    deploy:
      mode: global
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M

  # ============================================================================
  # Umami Analytics (Product analytics, UTM attribution, conversion funnel)
  # Exposed at ${DOMAIN}/umami via Traefik (subpath, no subdomain needed).
  # ============================================================================
  umami:
    image: ghcr.io/umami-software/umami:latest
    restart: unless-stopped

    depends_on:
      umami-db:
        condition: service_healthy

    environment:
      - DATABASE_URL=postgresql://${UMAMI_DB_USER}:${UMAMI_DB_PASSWORD}@umami-db:5432/${UMAMI_DB_NAME}
      - APP_SECRET=${UMAMI_APP_SECRET}
      - BASE_PATH=/umami

    networks:
      - monitoring-network
      - traefik-network

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${PROJECT}-umami.priority=75"
      - "traefik.http.routers.${PROJECT}-umami.rule=Host(`${DOMAIN}`) && PathPrefix(`/umami`)"
      - "traefik.http.routers.${PROJECT}-umami.entrypoints=websecure"
      - "traefik.http.routers.${PROJECT}-umami.tls=true"
      - "traefik.http.routers.${PROJECT}-umami.tls.certresolver=letsencrypt"
      - "traefik.http.services.${PROJECT}-umami.loadbalancer.server.port=3000"

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    deploy:
      mode: global
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
