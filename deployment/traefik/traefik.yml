# ==============================================================================
# Traefik Static Configuration
# Description: Global Traefik reverse proxy configuration with automatic TLS.
#              Uses Cloudflare DNS-01 challenge for Let's Encrypt certificates.
#
# Mount: ./traefik.yml:/traefik.yml:ro
# ==============================================================================

# ------------------------------------------------------------------------------
# Global Configuration
# ------------------------------------------------------------------------------
global:
  checkNewVersion: false
  sendAnonymousUsage: false

# ------------------------------------------------------------------------------
# API and Dashboard
# ------------------------------------------------------------------------------
api:
  dashboard: true
  insecure: false
  debug: false

# ------------------------------------------------------------------------------
# Ping (Health Check Endpoint)
# ------------------------------------------------------------------------------
ping:
  entryPoint: traefik

# ------------------------------------------------------------------------------
# Metrics (Prometheus)
# ------------------------------------------------------------------------------
metrics:
  prometheus:
    addEntryPointsLabels: true
    addRoutersLabels: true
    addServicesLabels: true

# ------------------------------------------------------------------------------
# Entrypoints
# ------------------------------------------------------------------------------
entryPoints:
  web:
    address: ':80'
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  websecure:
    address: ':443'
    forwardedHeaders:
      trustedIPs:
        - '103.21.244.0/22'
        - '103.22.200.0/22'
        - '103.31.4.0/22'
        - '104.16.0.0/13'
        - '104.24.0.0/14'
        - '108.162.192.0/18'
        - '131.0.72.0/22'
        - '141.101.64.0/18'
        - '162.158.0.0/15'
        - '172.64.0.0/13'
        - '173.245.48.0/20'
        - '188.114.96.0/20'
        - '190.93.240.0/20'
        - '197.234.240.0/22'
        - '198.41.128.0/17'
    http:
      tls:
        certResolver: letsencrypt
      middlewares:
        - security-headers@file
        - rate-limit@file

  # Internal entrypoint for healthchecks
  traefik:
    address: ':8080'

# ------------------------------------------------------------------------------
# Providers
# ------------------------------------------------------------------------------
providers:
  docker:
    endpoint: 'unix:///var/run/docker.sock'
    exposedByDefault: false
    network: traefik-network
    watch: true
  file:
    filename: /dynamic.yml
    watch: true

# ------------------------------------------------------------------------------
# Certificate Resolvers (Let's Encrypt with Cloudflare DNS Challenge)
# ------------------------------------------------------------------------------
certificatesResolvers:
  letsencrypt:
    acme:
      email: kreditozrouti@gmail.com
      storage: /certs/acme.json
      caServer: https://acme-v02.api.letsencrypt.org/directory
      # DNS-01 Challenge via Cloudflare
      # Works perfectly with Cloudflare proxy enabled (orange cloud)
      dnsChallenge:
        provider: cloudflare
        # Wait for DNS propagation before verification
        delayBeforeCheck: 15
        resolvers:
          - '1.1.1.1:53'
          - '8.8.8.8:53'

  letsencrypt-staging:
    acme:
      email: kreditozrouti@gmail.com
      storage: /certs/acme-staging.json
      caServer: https://acme-staging-v02.api.letsencrypt.org/directory
      dnsChallenge:
        provider: cloudflare
        delayBeforeCheck: 15
        resolvers:
          - '1.1.1.1:53'
          - '8.8.8.8:53'

# ------------------------------------------------------------------------------
# Logging
# ------------------------------------------------------------------------------
log:
  level: INFO
  format: common

accessLog:
  filePath: /var/log/traefik/access.log
  format: json
  bufferingSize: 100
