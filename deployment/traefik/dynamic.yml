# ==============================================================================
# Traefik Dynamic Configuration
# Global middlewares — applied to all routers via websecure entrypoint.
# Supports Go template syntax: {{ env "VAR_NAME" }}
# ==============================================================================

http:
  middlewares:

    # --------------------------------------------------------------------------
    # Security headers — added to every response
    # --------------------------------------------------------------------------
    security-headers:
      headers:
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        forceSTSHeader: true
        frameDeny: true
        contentTypeNosniff: true
        referrerPolicy: strict-origin-when-cross-origin
        customResponseHeaders:
          X-XSS-Protection: "0"
          Permissions-Policy: "camera=(), microphone=(), geolocation=()"

    # --------------------------------------------------------------------------
    # Rate limit — per real IP backstop (CrowdSec handles sophisticated abuse)
    # --------------------------------------------------------------------------
    rate-limit:
      rateLimit:
        average: 100
        burst: 200
        period: 1s
        sourceCriterion:
          ipStrategy:
            depth: 1

    # --------------------------------------------------------------------------
    # CrowdSec WAF bouncer — IP reputation + AppSec OWASP CRS request scanning
    # Reads LAPI key from Traefik env var via Go template (file provider feature)
    # --------------------------------------------------------------------------
    crowdsec-bouncer:
      plugin:
        crowdsec-bouncer:
          enabled: true
          logLevel: INFO
          crowdsecMode: live
          crowdsecLapiScheme: http
          crowdsecLapiHost: crowdsec:8080
          crowdsecLapiKey: '{{ env "CROWDSEC_BOUNCER_API_KEY" }}'
          crowdsecAppsecEnabled: true
          crowdsecAppsecHost: crowdsec:7422
          crowdsecAppsecFailureBlock: true
          crowdsecAppsecUnreachableBlock: false

# ------------------------------------------------------------------------------
# TLS options — 'default' is applied automatically to all routers
# ------------------------------------------------------------------------------
tls:
  options:
    default:
      minVersion: VersionTLS12
      cipherSuites:
        - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305_SHA256
        - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256
