# ==============================================================================
# Docker Compose: Traefik Reverse Proxy
# Description: Global Traefik reverse proxy with automatic TLS via Let's Encrypt.
#              Uses Cloudflare DNS-01 challenge (works with CF proxy enabled).
#
# Features:
#   - Automatic HTTPS with Let's Encrypt (DNS-01 via Cloudflare)
#   - HTTP to HTTPS redirect
#   - Dashboard with basic auth + IP allowlist protection
#   - Docker provider for automatic service discovery
#   - CrowdSec WAF sidecar (LAPI + AppSec OWASP CRS)
#
# Required Environment Variables:
#   - TRAEFIK_DOMAIN: Domain for the Traefik dashboard
#   - TRAEFIK_CREDENTIALS_PATH: Path to htpasswd file for basic auth
#   - TRAEFIK_ALLOWED_IPS: Comma-separated CIDRs allowed to access dashboard
#   - CF_API_EMAIL: Cloudflare account email
#   - CF_DNS_API_TOKEN: Cloudflare API token with Zone:DNS:Edit permissions
#   - CROWDSEC_BOUNCER_API_KEY: CrowdSec LAPI key (generated from cscli bouncers add)
#
# Usage: docker compose -f docker-compose.traefik.yml -f networks.yml -f volumes.yml up -d
# ==============================================================================

services:
  traefik:
    image: traefik:v3.7.5
    restart: always

    command:
      - '--configFile=/traefik.yml'

    # Cloudflare DNS Challenge credentials + CrowdSec bouncer API key
    environment:
      - CF_API_EMAIL=${CF_API_EMAIL}
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
      - CROWDSEC_BOUNCER_API_KEY=${CROWDSEC_BOUNCER_API_KEY}

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certificates-volume:/certs
      - traefik-logs-volume:/var/log/traefik
      - ./traefik.yml:/traefik.yml:ro
      - ./dynamic.yml:/dynamic.yml:ro
      - ${TRAEFIK_CREDENTIALS_PATH}:/credentials.txt:ro

    networks:
      - traefik-network
      - alloy-network

    ports:
      - '80:80'
      - '443:443'

    labels:
      # Enable Traefik for this container
      - 'traefik.enable=true'

      # Dashboard Router
      - 'traefik.http.routers.traefik-dashboard.rule=Host(`${TRAEFIK_DOMAIN}`)'
      - 'traefik.http.routers.traefik-dashboard.entrypoints=websecure'
      - 'traefik.http.routers.traefik-dashboard.tls=true'
      - 'traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt'
      - 'traefik.http.routers.traefik-dashboard.service=api@internal'

      # IP Allowlist (dashboard only — allows only known admin IPs)
      - 'traefik.http.middlewares.traefik-ip-allowlist.ipallowlist.sourcerange=${TRAEFIK_ALLOWED_IPS}'

      # Middlewares — IP check first, then auth
      - 'traefik.http.routers.traefik-dashboard.middlewares=traefik-ip-allowlist,traefik-auth'

      # Basic Auth Middleware
      - 'traefik.http.middlewares.traefik-auth.basicauth.usersfile=/credentials.txt'

    healthcheck:
      test: [ 'CMD', 'wget', '-q', '--spider', 'http://localhost:8080/ping' ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    logging:
      driver: 'json-file'
      options:
        max-size: '20m'
        max-file: '5'

    deploy:
      mode: global
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '2'
          memory: 2048M
        reservations:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        monitor: 60s
        order: stop-first

  crowdsec:
    image: crowdsecurity/crowdsec:v1.7.8
    restart: always
    environment:
      - COLLECTIONS=crowdsecurity/traefik crowdsecurity/appsec-virtual-patching crowdsecurity/appsec-generic-rules
      - CUSTOM_HOSTNAME=kreditozrouti-vps
      - DISABLE_ONLINE_API=false
    volumes:
      - crowdsec-db-volume:/var/lib/crowdsec/data
      - crowdsec-config-volume:/etc/crowdsec
      - traefik-logs-volume:/var/log/traefik:ro
      - ./crowdsec/acquis.yml:/etc/crowdsec/acquis.d/traefik.yml:ro
    networks:
      - traefik-network
    healthcheck:
      test: [ 'CMD', 'cscli', 'version' ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
