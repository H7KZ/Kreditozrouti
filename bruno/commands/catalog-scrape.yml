info:
  name: Run Catalog Scrape
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/commands/insis/catalog"
  body:
    type: json
    data: |-
      {
        "faculties": [],
        "periods": [
          {
            "semester": "ZS",
            "year": 2026
          }
        ],
        "auto_queue_courses": false
      }
  auth:
    type: bearer
    token: "{{api_command_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
